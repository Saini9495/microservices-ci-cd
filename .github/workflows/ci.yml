name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build User Service Image
        run: docker build ./user-service -t user-service

      - name: Build Product Service Image
        run: docker build ./product-service -t product-service