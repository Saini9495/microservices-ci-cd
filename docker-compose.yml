version: "3"

services:

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "5001:5001"

  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "5002:5002"

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - user-service
      - product-service